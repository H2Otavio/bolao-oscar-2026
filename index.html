<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Oscar 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars"></div>
    <div class="twinkling"></div>

    <header class="header">
        <div class="logo">
            <span class="golden-text">OSCAR</span>
            <span class="year">2026</span>
        </div>
        <h1>Bolão Oficial</h1>
        <p>Faça suas apostas para a maior noite do cinema.</p>
    </header>

    <main class="container">
        <section class="user-info card glass">
            <h2>Quem é você?</h2>
            <p>Insira seu nome para registrarmos seus palpites.</p>
            <div class="input-group">
                <input type="text" id="userName" placeholder="Seu nome completo" required>
            </div>
        </section>

        <form id="predictionsForm">
            <div id="categoriesContainer" class="categories-grid">
                <!-- Categories will be injected here by JS -->
            </div>

            <div class="submit-section">
                <div class="progress-info">
                    <span id="progressText">0 / 4 categorias respondidas</span>
                </div>
                <button type="submit" id="submitBtn" class="btn-primary" disabled>
                    <span>Enviar Palpites</span>
                    <div class="loader hidden"></div>
                </button>
            </div>
        </form>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="modal hidden">
        <div class="modal-content glass">
            <div class="success-icon">🏆</div>
            <h2>Palpites Registrados!</h2>
            <p>Seus votos foram salvos com sucesso na nossa base de dados. Boa sorte!</p>
            <button id="closeModalBtn" class="btn-secondary">Fechar</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
